# Port: default 8081 locally; set env PORT on cloud (e.g. Heroku/Render). Do not paste this line into PowerShell.
server.port=${PORT:8081}

# SQLite datasource
spring.datasource.url=jdbc:sqlite:cbmp.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Multipart (document uploads)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# CORS: comma-separated frontend origins (e.g. Vercel). Set env CORS_ALLOWED_ORIGINS on Render.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}
